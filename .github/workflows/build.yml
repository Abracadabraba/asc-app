name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper 8.2 in an isolated empty folder
        run: |
          mkdir -p /tmp/wrapper-gen
          cd /tmp/wrapper-gen
          touch settings.gradle
          gradle wrapper --gradle-version 8.2 --no-daemon
          cp -r gradle "$GITHUB_WORKSPACE/"
          cp gradlew "$GITHUB_WORKSPACE/"
          cp gradlew.bat "$GITHUB_WORKSPACE/"
          chmod +x "$GITHUB_WORKSPACE/gradlew"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASC-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
